<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARDUST | 星尘演化系统</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', monospace; color: #0ff; }
        /* 视频预览窗口 - 确保用户能看到自己是否在画框内 */
        #webcam-video { position: absolute; width: 140px; height: 105px; z-index: 10; transform: scaleX(-1); border-radius: 8px; bottom: 20px; right: 20px; opacity: 0.4; border: 1px solid rgba(0,255,255,0.4); background: #111; }
        
        #nav-panel { position: absolute; top: 40px; left: 40px; z-index: 20; }
        .menu-title { font-size: 0.8em; letter-spacing: 4px; border-bottom: 1px solid #0ff; padding-bottom: 5px; margin-bottom: 15px; opacity: 0.7; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .btn { background: transparent; border: 1px solid rgba(0, 255, 255, 0.2); color: #0ff; padding: 10px 18px; cursor: pointer; text-align: left; font-size: 0.75em; transition: 0.3s; }
        .btn:hover { background: rgba(0, 255, 255, 0.1); border-color: #0ff; padding-left: 25px; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; text-align: center; }
        .system-status { position: absolute; bottom: 40px; left: 40px; color: rgba(0, 255, 255, 0.5); font-size: 0.6em; line-height: 1.5; pointer-events: none; }
        .blink { animation: b 1.5s infinite; } @keyframes b { 50% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div id="overlay" onclick="startSystem()">
        <h1 style="letter-spacing:20px; font-weight: 100; margin-bottom: 10px;">STARDUST</h1>
        <p id="loader-msg" class="blink">[ 点击初始化全息协议 ]</p>
        <p style="font-size: 0.6em; opacity: 0.4; margin-top: 20px;">需开启摄像头权限以实现手势交互</p>
    </div>

    <div id="nav-panel">
        <div class="menu-title">形态切换 / MORPHING</div>
        <div class="btn-group">
            <button class="btn" onclick="morphTo('sphere')">01_核心 (SINGULARITY)</button>
            <button class="btn" onclick="morphTo('comet')">02_掠影 (VAGRANT)</button>
            <button class="btn" onclick="morphTo('saturn')">03_光环 (ECLIPTIC)</button>
            <button class="btn" onclick="morphTo('nebula')">04_弥散 (DIFFUSION)</button>
        </div>
    </div>

    <div class="system-status" id="status-text">
        > 系统就绪<br>
        > 模式: 锐利星尘颗粒 v7.5
    </div>

    <video id="webcam-video" autoplay muted playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // 强制 HTTPS 跳转
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            location.replace(`https:${location.href.substring(location.protocol.length)}`);
        }

        let scene, camera, renderer, composer, controls, galaxy, clock;
        let lastHandX = null, lastHandY = null, handOpenness = 0, explodeFactor = 1.0, isExploded = false;
        const PARTICLE_COUNT = 35000;
        let targetPositions, targetColors;
        const presets = {};

        const vsh = `uniform float uTime; varying vec3 vCol; varying float vTwinkle; void main() { vCol = color; vTwinkle = sin(uTime * 2.0 + position.x * 10.0) * 0.5 + 0.5; vec4 mvPos = modelViewMatrix * vec4(position, 1.0); gl_PointSize = 2.4 * (300.0 / -mvPos.z); gl_Position = projectionMatrix * mvPos; }`;
        const fsh = `varying vec3 vCol; varying float vTwinkle; void main() { float r = distance(gl_PointCoord, vec2(0.5)); if (r > 0.15) discard; float brightness = 0.8 + vTwinkle * 0.25; gl_FragColor = vec4(vCol * brightness, 0.75 - r * 6.5); }`;

        function generatePresets() {
            const sphereP = new Float32Array(PARTICLE_COUNT * 3), sphereC = new Float32Array(PARTICLE_COUNT * 3);
            const cometP = new Float32Array(PARTICLE_COUNT * 3), cometC = new Float32Array(PARTICLE_COUNT * 3);
            const saturnP = new Float32Array(PARTICLE_COUNT * 3), saturnC = new Float32Array(PARTICLE_COUNT * 3);
            const nebulaP = new Float32Array(PARTICLE_COUNT * 3), nebulaC = new Float32Array(PARTICLE_COUNT * 3);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // 1. 核心
                const rS = 10 * Math.cbrt(Math.random());
                const tS = Math.random()*Math.PI*2, pS = Math.acos(2*Math.random()-1);
                sphereP[i*3] = rS*Math.sin(pS)*Math.cos(tS); sphereP[i*3+1] = rS*Math.sin(pS)*Math.sin(tS); sphereP[i*3+2] = rS*Math.cos(pS);
                const cS = new THREE.Color(0x336699); sphereC[i*3]=cS.r; sphereC[i*3+1]=cS.g; sphereC[i*3+2]=cS.b;

                // 2. 彗星
                if (i < PARTICLE_COUNT * 0.1) {
                    const r = 2.5 * Math.random();
                    cometP[i*3]=(Math.random()-0.5)*r; cometP[i*3+1]=(Math.random()-0.5)*r; cometP[i*3+2]=(Math.random()-0.5)*r + 15;
                } else {
                    const z = Math.random()*48; const noise = Math.sin(z * 0.25) * 2.0; const spread = (z * 0.2) + (Math.random() * 2.0);
                    cometP[i*3]=(Math.random()-0.5)*spread + noise; cometP[i*3+1]=(Math.random()-0.5)*spread - noise; cometP[i*3+2]=-z + 15;
                }
                const cCo = new THREE.Color(0x998877); cometC[i*3]=cCo.r; cometC[i*3+1]=cCo.g; cometC[i*3+2]=cCo.b;

                // 3. 土星
                if (i < PARTICLE_COUNT * 0.55) {
                    const r = 6.5 * Math.cbrt(Math.random());
                    const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
                    saturnP[i*3]=r*Math.sin(p)*Math.cos(t); saturnP[i*3+1]=r*Math.sin(p)*Math.sin(t); saturnP[i*3+2]=r*Math.cos(p);
                    const c = new THREE.Color(0x446688); saturnC[i*3]=c.r; saturnC[i*3+1]=c.g; saturnC[i*3+2]=c.b;
                } else {
                    const r = 10 + Math.random()*7.5; const t = Math.random()*Math.PI*2;
                    saturnP[i*3]=r*Math.cos(t); saturnP[i*3+1]=(Math.random()-0.5)*0.3; saturnP[i*3+2]=r*Math.sin(t);
                    const c = new THREE.Color(0x776655); saturnC[i*3]=c.r; saturnC[i*3+1]=c.g; saturnC[i*3+2]=c.b;
                }

                // 4. 星云
                nebulaP[i*3] = (Math.random()-0.5)*35 + Math.sin(i)*4; nebulaP[i*3+1] = (Math.random()-0.5)*22; nebulaP[i*3+2] = (Math.random()-0.5)*22;
                const cN = new THREE.Color().setHSL(0.75 + Math.random()*0.1, 0.3, 0.4); nebulaC[i*3]=cN.r; nebulaC[i*3+1]=cN.g; nebulaC[i*3+2]=cN.b;
            }
            presets.sphere = {p:sphereP, c:sphereC}; presets.comet = {p:cometP, c:cometC}; presets.saturn = {p:saturnP, c:saturnC}; presets.nebula = {p:nebulaP, c:nebulaC};
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 45); clock = new THREE.Clock();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            generatePresets();
            targetPositions = presets.sphere.p; targetColors = presets.sphere.c;
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(presets.sphere.p), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(presets.sphere.c), 3));
            const mat = new THREE.ShaderMaterial({ uniforms: { uTime: { value: 0 } }, vertexShader: vsh, fragmentShader: fsh, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true });
            galaxy = new THREE.Points(geo, mat); scene.add(galaxy);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.autoRotate = true; controls.autoRotateSpeed = 0.5;
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.35, 0.4, 0.1));
            window.addEventListener('dblclick', () => { isExploded = !isExploded; });
        }

        window.morphTo = (type) => { targetPositions = presets[type].p; targetColors = presets[type].c; isExploded = false; };

        function onResults(results) {
            if (!results.multiHandLandmarks || !controls) return;
            const hands = results.multiHandLandmarks;
            const statusEl = document.getElementById('status-text');
            if (hands.length > 0) {
                const lm = hands[0];
                const dx = lm[4].x - lm[20].x, dy = lm[4].y - lm[20].y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                handOpenness = Math.max(0, Math.min(1, (dist - 0.08) / 0.15));
                const finger = lm[8];
                if (lastHandX !== null) {
                    controls.rotateLeft(-(finger.x - lastHandX) * 40);
                    controls.rotateUp(-(finger.y - lastHandY) * 40);
                }
                lastHandX = finger.x; lastHandY = finger.y;
                statusEl.innerHTML = `> 手势引力: ${(handOpenness*100).toFixed(0)}%<br>> 模式: 动力学交互在线`;
            } else {
                lastHandX = null; lastHandY = null; handOpenness *= 0.9;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            galaxy.material.uniforms.uTime.value = clock.getElapsedTime();
            controls.update();
            const targetFactor = (isExploded ? 4.5 : 1.0) + (handOpenness * 4.2);
            explodeFactor += (targetFactor - explodeFactor) * 0.08;
            const pos = galaxy.geometry.attributes.position.array;
            const col = galaxy.geometry.attributes.color.array;
            for (let i = 0; i < pos.length; i++) {
                pos[i] += (targetPositions[i] * explodeFactor - pos[i]) * 0.07;
                col[i] += (targetColors[i] - col[i]) * 0.04;
            }
            galaxy.geometry.attributes.position.needsUpdate = true;
            galaxy.geometry.attributes.color.needsUpdate = true;
            composer.render();
        }

        window.startSystem = async () => {
            const msg = document.getElementById('loader-msg');
            msg.innerText = "[ 正在链接神经元引擎... ]";
            init();
            try {
                const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 });
                hands.onResults(onResults);
                const cam = new Camera(document.getElementById('webcam-video'), { onFrame: async () => { await hands.send({image: document.getElementById('webcam-video')}); }, width: 640, height: 480 });
                await cam.start();
                document.getElementById('overlay').style.display = 'none';
                animate();
            } catch (e) {
                msg.innerText = "[ 摄像头启动失败 - 切换至纯鼠标模式 ]";
                setTimeout(() => { document.getElementById('overlay').style.display = 'none'; animate(); }, 2000);
            }
        };

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
